    <title>暑假打卡</title>
    <style>
      /* ===== 首屏骨架屏 — 在 JS 加载前由浏览器直接渲染 ===== */
      #app-skeleton {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #f5f5f7;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #app-skeleton.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .skeleton-logo {
        font-size: 48px;
        margin-bottom: 16px;
        animation: skeleton-pulse 1.5s ease-in-out infinite;
      }
      .skeleton-title {
        font-size: 20px;
        font-weight: 700;
        color: #4A90D9;
        margin-bottom: 8px;
      }
      .skeleton-subtitle {
        font-size: 13px;
        color: #999;
        margin-bottom: 32px;
      }
      .skeleton-bars {
        width: 80%;
        max-width: 320px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .skeleton-bar {
        height: 16px;
        border-radius: 8px;
        background: linear-gradient(90deg, #eee 25%, #f0f0f0 50%, #eee 75%);
        background-size: 200% 100%;
        animation: skeleton-shimmer 1.5s ease-in-out infinite;
      }
      .skeleton-bar:nth-child(1) { width: 60%; }
      .skeleton-bar:nth-child(2) { width: 90%; }
      .skeleton-bar:nth-child(3) { width: 75%; }
      @keyframes skeleton-shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      @keyframes skeleton-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      @media (prefers-color-scheme: dark) {
        #app-skeleton { background: #1a1a1a; }
        .skeleton-title { color: #5ba3e8; }
        .skeleton-subtitle { color: #666; }
        .skeleton-bar {
          background: linear-gradient(90deg, #2a2a2a 25%, #333 50%, #2a2a2a 75%);
          background-size: 200% 100%;
        }
      }
    </style>

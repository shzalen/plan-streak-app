<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="body1" cx="50%" cy="35%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="70%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#E6B800"/>
    </radialGradient>
  </defs>
  <!-- 太阳光环 -->
  <g opacity="0.5">
    <line x1="100" y1="10" x2="100" y2="25" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="100" y1="175" x2="100" y2="190" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="100" x2="25" y2="100" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="175" y1="100" x2="190" y2="100" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="36" y1="36" x2="46" y2="46" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="154" y1="46" x2="164" y2="36" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="36" y1="164" x2="46" y2="154" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="154" y1="154" x2="164" y2="164" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- 蛋体 -->
  <ellipse cx="100" cy="110" rx="65" ry="70" fill="url(#body1)" stroke="#C4A600" stroke-width="2"/>
  <!-- 高光 -->
  <ellipse cx="75" cy="80" rx="20" ry="15" fill="rgba(255,255,255,0.3)"/>
  <!-- 眼睛 -->
  <circle cx="82" cy="100" r="10" fill="#333"/>
  <circle cx="118" cy="100" r="10" fill="#333"/>
  <circle cx="85" cy="97" r="3.5" fill="#FFF"/>
  <circle cx="121" cy="97" r="3.5" fill="#FFF"/>
  <!-- 腮红 -->
  <circle cx="68" cy="120" r="8" fill="#FF9999" opacity="0.6"/>
  <circle cx="132" cy="120" r="8" fill="#FF9999" opacity="0.6"/>
  <!-- 微笑 -->
  <path d="M85 130 Q100 140 115 130" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
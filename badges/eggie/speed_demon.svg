<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="body7" cx="50%" cy="35%">
      <stop offset="0%" stop-color="#80DEEA"/>
      <stop offset="70%" stop-color="#00BCD4"/>
      <stop offset="100%" stop-color="#006064"/>
    </radialGradient>
  </defs>
  <!-- 闪电速度线 -->
  <g stroke="#00E5FF" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <line x1="15" y1="60" x2="35" y2="60"/>
    <line x1="10" y1="80" x2="30" y2="80"/>
    <line x1="15" y1="100" x2="35" y2="100"/>
    <line x1="165" y1="60" x2="185" y2="60"/>
    <line x1="170" y1="80" x2="190" y2="80"/>
    <line x1="165" y1="100" x2="185" y2="100"/>
  </g>
  <!-- 闪电图标 -->
  <polygon points="145,30 130,55 142,55 132,75 155,45 143,45 153,30" fill="#FFD700" opacity="0.8"/>
  <!-- 蛋体（略倾斜表示速度） -->
  <ellipse cx="100" cy="110" rx="65" ry="70" fill="url(#body7)" stroke="#004D40" stroke-width="2" transform="rotate(-5 100 110)"/>
  <!-- 高光 -->
  <ellipse cx="75" cy="80" rx="20" ry="15" fill="rgba(255,255,255,0.3)" transform="rotate(-5 100 110)"/>
  <!-- 眼睛（专注的） -->
  <ellipse cx="82" cy="102" rx="8" ry="6" fill="#333" transform="rotate(-5 100 110)"/>
  <ellipse cx="118" cy="102" rx="8" ry="6" fill="#333" transform="rotate(-5 100 110)"/>
  <circle cx="84" cy="100" r="2.5" fill="#FFF"/>
  <circle cx="120" cy="100" r="2.5" fill="#FFF"/>
  <!-- 腮红 -->
  <circle cx="68" cy="125" r="8" fill="#80DEEA" opacity="0.5"/>
  <circle cx="132" cy="125" r="8" fill="#80DEEA" opacity="0.5"/>
  <!-- 嘴 -->
  <path d="M88 132 Q100 138 112 132" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
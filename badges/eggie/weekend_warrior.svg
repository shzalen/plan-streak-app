<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="body6" cx="50%" cy="35%">
      <stop offset="0%" stop-color="#F48FB1"/>
      <stop offset="70%" stop-color="#EC407A"/>
      <stop offset="100%" stop-color="#AD1457"/>

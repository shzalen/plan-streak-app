    <rect x="-25" y="-10" width="50" height="20" rx="10" fill="#333"/>
    <circle cx="-15" cy="0" r="4" fill="#666"/>
    <circle cx="15" cy="0" r="4" fill="#666"/>
    <rect x="-5" y="-3" width="3" height="6" fill="#666"/>
    <rect x="3" y="-3" width="3" height="6" fill="#666"/>
  </g>
  <!-- 眼睛 -->
  <circle cx="82" cy="105" r="10" fill="#333"/>
  <circle cx="118" cy="105" r="10" fill="#333"/>
  <circle cx="85" cy="102" r="3.5" fill="#FFF"/>
  <circle cx="121" cy="102" r="3.5" fill="#FFF"/>
  <!-- 腮红 -->
  <circle cx="68" cy="125" r="8" fill="#F8BBD0" opacity="0.7"/>
  <circle cx="132" cy="125" r="8" fill="#F8BBD0" opacity="0.7"/>
  <!-- 开心嘴 -->
  <path d="M82 132 Q100 143 118 132" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>

  </defs>
  <!-- 蛋体 -->
  <ellipse cx="100" cy="110" rx="65" ry="70" fill="url(#body6)" stroke="#880E4F" stroke-width="2"/>
  <!-- 高光 -->
  <ellipse cx="75" cy="80" rx="20" ry="15" fill="rgba(255,255,255,0.3)"/>
  <!-- 游戏手柄 -->

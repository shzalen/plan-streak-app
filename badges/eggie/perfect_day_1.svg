  <polygon points="118,90 115,100 118,110 121,100" fill="#333"/>
  <circle cx="82" cy="98" r="2.5" fill="#FFF"/>
  <circle cx="118" cy="98" r="2.5" fill="#FFF"/>
  <!-- 腮红 -->
  <circle cx="68" cy="125" r="8" fill="#FFAB91" opacity="0.7"/>
  <circle cx="132" cy="125" r="8" fill="#FFAB91" opacity="0.7"/>
